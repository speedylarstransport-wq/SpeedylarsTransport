<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Error 404</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.container{
    text-align:center;
}

h1{
    font-size:120px;
    margin:0;
}

p{
    font-size:20px;
    margin-bottom:30px;
}

a{
    text-decoration:none;
    background:white;
    color:#2a5298;
    padding:12px 25px;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

a:hover{
    background:#e4e4e4;
}
</style>

</head>
<body>

<div class="container">
    <h1>404</h1>
    <p>Oops... la página que buscas no existe.</p>
    <a href="/">Volver al inicio</a>
</div>

</body>
</html>
